name: Daily results refresh

# Fetches World Cup results once a day and commits the updated cache so the
# Streamlit Cloud app always shows data no more than ~a day old, regardless
# of whether anyone opens it.

on:
  schedule:
    # 08:00 UTC = 16:00 SGT — after the day's matches finish (latest kickoff
    # is ~12:00 PM SGT) plus buffer for the data source to populate.
    # Note: GitHub may delay scheduled runs during peak load.
    - cron: "0 8 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write          # needed to commit the refreshed cache

concurrency:
  group: daily-results
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest results
        run: python fetch_results.py

      - name: Commit updated cache if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results_cache.csv
          if git diff --staged --quiet; then
            echo "No changes in results — nothing to commit."
          else
            git commit -m "Daily results refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
