name: Daily results refresh

# Fetches World Cup results three times a day and commits the updated cache so
# the Streamlit Cloud app always shows fresh data, regardless of whether anyone
# opens it.

on:
  schedule:
    # Targeting ~07:23 / 11:23 / 14:23 SGT (UTC+8). GitHub's scheduled-run
    # queue tends to fire these ~2h late, so the cron is set 2h ahead of target
    # — 21:23 / 01:23 / 04:23 UTC — to land near those SGT slots in practice.
    # Minute :23 (off the top of the hour) also trims queue delay, which is
    # worst at minute :00. Even so, GitHub treats scheduled runs as best-effort:
    # exact timing isn't guaranteed and a run is occasionally dropped under load.
    - cron: "23 1,4,21 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write          # needed to commit the refreshed cache

concurrency:
  group: daily-results
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest results
        env:
          # Preferred source. If unset, falls back to TSDB_KEY, then the free TSDB key.
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          TSDB_KEY: ${{ secrets.TSDB_KEY }}
        run: python fetch_results.py

      - name: Commit refreshed cache and run time
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results_cache.csv last_refresh.txt
          if git diff --staged --quiet; then
            echo "Nothing to commit (fetch produced no changes)."
          else
            git commit -m "Results refresh ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
