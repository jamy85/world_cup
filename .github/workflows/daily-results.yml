name: Daily results refresh

# Fetches World Cup results twice a day and commits the updated cache so the
# Streamlit Cloud app always shows fresh data, regardless of whether anyone
# opens it.

on:
  schedule:
    # Twice daily: 01:00 UTC = 09:00 SGT and 07:00 UTC = 15:00 SGT.
    # Note: GitHub may delay scheduled runs during peak load.
    - cron: "0 1,7 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write          # needed to commit the refreshed cache

concurrency:
  group: daily-results
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest results
        run: python fetch_results.py

      - name: Commit refreshed cache and run time
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results_cache.csv last_refresh.txt
          if git diff --staged --quiet; then
            echo "Nothing to commit (fetch produced no changes)."
          else
            git commit -m "Results refresh ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
