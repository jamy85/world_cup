name: Daily results refresh

# Fetches World Cup results twice a day and commits the updated cache so the
# Streamlit Cloud app always shows fresh data, regardless of whether anyone
# opens it.

on:
  schedule:
    # Three times daily, in SGT (UTC+8):
    #   23:23 UTC = 07:23 SGT, 03:23 UTC = 11:23 SGT, 06:23 UTC = 14:23 SGT.
    # Offset to minute :23 (off the top of the hour) to reduce GitHub's
    # scheduled-run queue delay, which is worst at minute :00. Note: GitHub
    # still treats scheduled runs as best-effort and may delay them anyway.
    - cron: "23 23,3,6 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write          # needed to commit the refreshed cache

concurrency:
  group: daily-results
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest results
        env:
          # Preferred source. If unset, falls back to TSDB_KEY, then the free TSDB key.
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          TSDB_KEY: ${{ secrets.TSDB_KEY }}
        run: python fetch_results.py

      - name: Commit refreshed cache and run time
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results_cache.csv last_refresh.txt
          if git diff --staged --quiet; then
            echo "Nothing to commit (fetch produced no changes)."
          else
            git commit -m "Results refresh ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
